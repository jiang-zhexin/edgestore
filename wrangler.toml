name = "edgestore"
main = "src/index.ts"
compatibility_date = "2024-12-05"
minify = true
upload_source_maps = true
workers_dev = false

[observability]
enabled = true

[[routes]]
custom_domain = true
pattern = "edgestore.link"

[[services]]
binding = "store"
service = "file"

[[d1_databases]]
binding = "DB"
database_name = "edgestore"
database_id = "da3bcf3e-34ab-4a43-987b-01de6b7ceb65"

[vars]
script_name = "file"


[[env.dev.d1_databases]]
binding = "DB"
database_name = "edgestore"
database_id = ""

[env.dev.vars]
script_name = "file"
